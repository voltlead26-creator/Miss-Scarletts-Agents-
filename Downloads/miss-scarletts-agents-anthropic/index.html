<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miss Scarletts Agent Console</title>
    <meta http-equiv="refresh" content="0; url=./dist/app.html" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #020617;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(760px, calc(100vw - 32px));
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 16px;
        padding: 24px;
        background: rgba(15, 23, 42, 0.88);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.6;
        color: #cbd5e1;
      }
      a {
        color: #67e8f9;
        text-decoration: none;
        font-weight: 600;
      }
      code {
        background: rgba(15, 23, 42, 0.9);
        padding: 2px 6px;
        border-radius: 6px;
        border: 1px solid rgba(148, 163, 184, 0.16);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Miss Scarletts Agent Console</h1>
      <p>
        Opening the built app in <code>dist/app.html</code>.
      </p>
      <p>
        If your browser does not follow the redirect automatically, open:
        <a href="./dist/app.html">dist/app.html</a>
      </p>
      <p>
        For development, the app can still be started with <code>npm run dev</code>, but that is not required on this Mac.
      </p>
    </main>
  </body>
</html>
